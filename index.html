<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYNTAX HUB | ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{ --bg:#050a14; --accent:#00e1ff; --text:#e0f7ff; --warn:#ffcc00; }
    body{ background:var(--bg); color:var(--text); font-family:'Share Tech Mono', monospace; padding:15px; margin:0; }
    .container{ max-width:600px; margin:auto; width:100%; box-sizing:border-box; }
    
    .announcement { background:rgba(255,204,0,0.05); border:1px solid var(--warn); padding:10px; border-radius:10px; margin-bottom:15px; text-align:center; font-size:0.8rem; color:var(--warn); }
    .header-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
    
    .script-card{ background:rgba(13,22,38,0.8); border:1px solid var(--accent); padding:15px; border-radius:12px; margin-bottom:12px; position:relative; }
    .script-body{ background:#000; padding:8px; border-radius:6px; font-size:0.75rem; color:var(--accent); border-left:3px solid var(--accent); margin:10px 0; word-break: break-all; }
    .main-btn { padding:8px 12px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; width:100%; font-family:Orbitron; border-radius:5px; font-size:0.8rem; margin-top:5px; transition: 0.3s; }
    .del-btn { position:absolute; top:10px; right:10px; background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:1.2rem; }
    
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; padding:10px; box-sizing:border-box; }
    .modal-content { background:#0a0a0c; padding:20px; border:1px solid var(--accent); border-radius:15px; width:100%; max-width:400px; }
    
    .input-wrapper { position: relative; width: 100%; }
    input { width:100%; padding:10px; margin:5px 0 10px 0; background:#000; border:1px solid #333; color:white; border-radius:5px; box-sizing:border-box; }
    .toggle-pass { position: absolute; right: 10px; top: 12px; cursor: pointer; color: var(--accent); font-size: 0.7rem; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="announcement" id="announcementText">📢 Loading...</div>
  <div class="header-row">
    <h1 style="font-family:Orbitron; color:var(--accent); font-size:1.4rem; margin:0;">SYNTAX HUB</h1>
    <button class="main-btn" style="width:auto" onclick="openModal('password')">ADMIN</button>
  </div>
  <div id="scripts-container"></div>
</div>

<div id="unifiedModal" class="modal"><div class="modal-content" id="modalBody"></div></div>

<script>
  const PASSWORD = "syntax2011";
  let data = JSON.parse(localStorage.getItem('syntaxData')) || {
    announcement: "Welcome to Syntax Hub - Elite Scripts",
    scripts: [
      {name: 'Adopt Me', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/adopt-me"))()'},
      {name: 'Murder Mystery 2', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/Overdrive-H/refs/heads/main/loader.lua"))()'},
      {name: 'Ping Checker', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/ionlyusecoffee/ping-checker/main/ping-checker.lua"))()'},
      {name: 'Steal A Brainrot', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/sab"))()'},
      {name: 'Sailor Piece', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx/loader/v1"))()'}
    ]
  };

  function render() {
    document.getElementById('announcementText').innerText = data.announcement;
    const container = document.getElementById('scripts-container');
    container.innerHTML = '';
    data.scripts.forEach((s, i) => {
      container.innerHTML += `
        <div class="script-card">
          <button class="del-btn" onclick="openModal('delete', ${i})">✕</button>
          <div style="font-family:Orbitron; font-weight:bold;">⚡ ${s.name}</div>
          <div class="script-body">${s.code}</div>
          <button class="main-btn" id="btn-${i}" onclick="copyScript(${i})">COPY SCRIPT</button>
        </div>`;
    });
  }

  function toggle() {
    const p = document.getElementById('passField');
    const t = document.getElementById('toggleBtn');
    if(p.type === 'password') { p.type = 'text'; t.innerText = 'HIDE'; }
    else { p.type = 'password'; t.innerText = 'SHOW'; }
  }

  function openModal(type, index) {
    const b = document.getElementById('modalBody');
    document.getElementById('unifiedModal').style.display = 'flex';
    if(type === 'password') {
      b.innerHTML = `<h3>LOGIN</h3><div class="input-wrapper"><input type="password" id="passField" placeholder="Enter Password..."><span class="toggle-pass" id="toggleBtn" onclick="toggle()">SHOW</span></div><button class="main-btn" onclick="checkPass()">ENTER</button><button class="main-btn" onclick="closeModal()">CLOSE</button>`;
    } else if(type === 'admin') {
      b.innerHTML = `<h3>ADMIN PANEL</h3><input type="text" id="aIn" placeholder="New Announcement"><input type="text" id="nIn" placeholder="Script Name"><input type="text" id="cIn" placeholder="Loadstring"><button class="main-btn" onclick="save()">SAVE CHANGES</button><button class="main-btn" onclick="closeModal()">CLOSE</button>`;
    } else {
      b.innerHTML = `<h3>DELETE SCRIPT</h3><p>Are you sure you want to remove this?</p><button class="main-btn" onclick="del(${index})">CONFIRM DELETE</button><button class="main-btn" onclick="closeModal()">CLOSE</button>`;
    }
  }

  function checkPass() { if(document.getElementById('passField').value === PASSWORD) openModal('admin'); else closeModal(); }
  function save() {
    if(document.getElementById('aIn').value) data.announcement = document.getElementById('aIn').value;
    if(document.getElementById('nIn').value && document.getElementById('cIn').value) data.scripts.push({name: document.getElementById('nIn').value, code: document.getElementById('cIn').value});
    localStorage.setItem('syntaxData', JSON.stringify(data)); closeModal(); render();
  }
  function del(i) { data.scripts.splice(i, 1); localStorage.setItem('syntaxData', JSON.stringify(data)); closeModal(); render(); }
  function closeModal() { document.getElementById('unifiedModal').style.display = 'none'; }
  async function copyScript(i) { 
    const btn = document.getElementById(`btn-${i}`);
    await navigator.clipboard.writeText(data.scripts[i].code);
    btn.innerText = "COPIED!";
    setTimeout(() => { btn.innerText = "COPY SCRIPT"; }, 1500);
  }

  render();
</script>
</body>
</html>
