<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYNTAX HUB | ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{ --bg:#050a14; --accent:#00e1ff; --text:#e0f7ff; --success:#bc13fe; --warn:#ffcc00; }
    body{ background:var(--bg); color:var(--text); font-family:'Share Tech Mono', monospace; padding:20px; margin:0; }
    .container{ max-width:800px; margin:auto; }
    
    .announcement { background:rgba(255,204,0,0.05); border:1px solid var(--warn); padding:10px; border-radius:10px; margin-bottom:20px; text-align:center; font-size:0.9rem; color:var(--warn); }
    .search-box { width:100%; padding:12px; margin-bottom:20px; background:#000; border:1px solid var(--accent); color:white; border-radius:10px; box-sizing:border-box; }
    
    .dashboard-container { background:rgba(0,225,255,0.05); border:1px solid var(--accent); padding:20px; border-radius:15px; margin-bottom:20px; text-align:center; }
    .dashboard-title { font-family:Orbitron; color:var(--accent); margin-bottom:15px; font-weight:bold; }
    .stats-grid { display:flex; justify-content:space-around; flex-wrap:wrap; gap:15px; }
    .stat-item { text-align:center; }
    .stat-val { font-size:1.1rem; color:var(--accent); font-weight:bold; margin-top:5px; }
    
    .status-box { margin-top:15px; padding:8px; background:rgba(0,0,0,0.4); border:1px solid #333; border-radius:8px; font-size:0.8rem; color:#aaa; }

    .header-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .script-card{ background:rgba(13,22,38,0.8); border:1px solid var(--accent); padding:20px; border-radius:15px; margin-bottom:20px; position:relative; }
    .script-body{ background:#000; padding:10px; border-radius:8px; font-size:0.7rem; color:var(--accent); border-left:4px solid var(--accent); margin:10px 0; overflow-x:auto; }
    .main-btn { padding:10px 20px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; width:100%; font-family:Orbitron; border-radius:5px; transition:0.3s; margin-top:5px; }
    .main-btn:hover { background:var(--accent); color:#000; }
    
    .del-btn { position:absolute; top:5px; right:5px; background:none; border:none; color:rgba(255,255,255,0.1); cursor:pointer; font-size:0.8rem; transition:0.3s; }
    .del-btn:hover { color:rgba(255,68,68,0.8); }

    /* MOBILE OPTIMIZED MODAL */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:flex-start; z-index:9999; overflow-y:auto; padding-top: 50px; }
    .modal-content { background:#0a0a0c; padding:20px; border:1px solid var(--accent); border-radius:15px; width:90%; max-width:400px; text-align:center; margin-bottom: 50px; }
    
    .input-wrapper { position: relative; width: 100%; }
    input { width:100%; padding:12px; margin:5px 0 15px 0; background:#000; border:1px solid #333; color:white; border-radius:5px; box-sizing:border-box; transition:0.3s; }
    input:focus { border-color:var(--accent); box-shadow: 0 0 10px rgba(0,225,255,0.3); outline:none; }
    .toggle-pass { position: absolute; right: 10px; top: 15px; cursor: pointer; color: var(--accent); font-size: 0.7rem; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="announcement" id="announcementText">📢 Loading...</div>

  <div class="header-row">
    <h1 style="font-family:Orbitron; color:var(--accent); margin:0;">SYNTAX HUB</h1>
    <button class="main-btn" style="width:auto" onclick="openModal('password')">ADMIN</button>
  </div>

  <input type="text" class="search-box" id="searchBar" placeholder="🔍 Search scripts..." onkeyup="render()">

  <div class="dashboard-container">
    <div class="dashboard-title">Usage Dashboard</div>
    <div class="stats-grid" id="dashboard-stats"></div>
    <div class="status-box">Script Status: <span style="color:#00ff88">● Undetected</span> | Version: 2.4.0</div>
  </div>

  <div id="scripts-container"></div>
</div>

<div id="unifiedModal" class="modal">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
  const STORAGE_KEY = "syntaxData_FINAL_v17";
  const PASSWORD = "syntax2011";
  
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    announcement: "Welcome to Syntax Hub - Elite Scripts",
    scripts: [
      {name: 'Adopt Me', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/adopt-me"))()', count: 0},
      {name: 'Murder Mystery 2', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/Overdrive-H/refs/heads/main/loader.lua"))()', count: 0}
    ]
  };

  function render() {
    const filter = document.getElementById('searchBar').value.toLowerCase();
    const container = document.getElementById('scripts-container');
    const dash = document.getElementById('dashboard-stats');
    document.getElementById('announcementText').innerText = data.announcement;
    container.innerHTML = '';
    dash.innerHTML = '';
    
    data.scripts.forEach((s, i) => {
      dash.innerHTML += `<div class="stat-item"><div>${s.name}:</div><div class="stat-val">${s.count}</div></div>`;
      if (s.name.toLowerCase().includes(filter)) {
        container.innerHTML += `
          <div class="script-card">
            <button class="del-btn" onclick="openModal('delete', ${i})">✕</button>
            <div style="font-family:Orbitron; font-weight:bold;">⚡ ${s.name}</div>
            <div class="script-body">${s.code}</div>
            <button class="main-btn" id="btn-${i}" onclick="copyScript(${i})">COPY SCRIPT</button>
          </div>`;
      }
    });
  }

  function toggleVisibility(id) {
    const input = document.getElementById(id);
    const btn = event.target;
    if (input.type === "password") {
      input.type = "text";
      btn.innerText = "HIDE";
    } else {
      input.type = "password";
      btn.innerText = "SHOW";
    }
  }

  function openModal(type, index) {
    const modal = document.getElementById('unifiedModal');
    const body = document.getElementById('modalBody');
    modal.style.display = 'flex';
    
    if (type === 'password') {
      body.innerHTML = `
        <h3 style="color:var(--accent)">ADMIN PANEL</h3>
        <div class="input-wrapper">
            <input type="password" id="passCheck" placeholder="Enter Admin Password...">
            <span class="toggle-pass" onclick="toggleVisibility('passCheck')">SHOW</span>
        </div>
        <button class="main-btn" onclick="checkPassword()">ENTER</button>
        <button class="main-btn" onclick="closeModal()">CLOSE</button>
      `;
    } else if (type === 'admin') {
      body.innerHTML = `
        <h3 style="color:var(--accent)">ADMIN PANEL</h3>
        <input type="text" id="annInput" placeholder="New Announcement">
        <input type="text" id="nInput" placeholder="New Script Name">
        <input type="text" id="cInput" placeholder="Loadstring">
        <button class="main-btn" onclick="saveData()">ENTER</button>
        <button class="main-btn" onclick="closeModal()">CLOSE</button>
      `;
    } else {
      body.innerHTML = `
        <h3 style="color:#ff4444">DELETE SCRIPT</h3>
        <div class="input-wrapper">
            <input type="password" id="delPass" placeholder="Enter Password...">
            <span class="toggle-pass" onclick="toggleVisibility('delPass')">SHOW</span>
        </div>
        <button class="main-btn" onclick="confirmDelete(${index})">ENTER</button>
        <button class="main-btn" onclick="closeModal()">CLOSE</button>
      `;
    }
  }

  function checkPassword() {
    if(document.getElementById('passCheck').value === PASSWORD) { openModal('admin'); }
    else { alert("Invalid Password!"); }
  }

  async function copyScript(i) {
    const btn = document.getElementById(`btn-${i}`);
    await navigator.clipboard.writeText(data.scripts[i].code);
    data.scripts[i].count += 1;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    btn.innerText = "COPIED!";
    btn.style.borderColor = "var(--success)";
    btn.style.color = "var(--success)";
    setTimeout(() => { btn.innerText = "COPY SCRIPT"; btn.style.borderColor = "var(--accent)"; btn.style.color = "var(--accent)"; render(); }, 1500);
  }

  function closeModal() { document.getElementById('unifiedModal').style.display = 'none'; }

  function confirmDelete(i) {
    if(document.getElementById('delPass').value === PASSWORD) {
      data.scripts.splice(i, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      closeModal();
      render();
    } else { alert("Invalid Password!"); }
  }

  function saveData() {
    const name = document.getElementById('nInput').value;
    const code = document.getElementById('cInput').value;
    const ann = document.getElementById('annInput').value;
    if(ann) data.announcement = ann;
    if(name && code) data.scripts.push({name, code, count: 0});
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    closeModal();
    render();
  }

  render();
</script>
</body>
</html>
