<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYNTAX HUB | ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{ --bg:#050a14; --accent:#7000ff; --text:#e0f7ff; }
    body{ background:var(--bg); color:var(--text); font-family:'Share Tech Mono', monospace; padding:10px; margin:0; }
    .container{ max-width:600px; margin:auto; }
    
    .dashboard-container { background:rgba(112,0,255,0.1); border:1px solid var(--accent); padding:15px; border-radius:12px; margin-bottom:15px; }
    .dashboard-title { font-family:Orbitron; color:var(--accent); margin-bottom:10px; font-weight:bold; text-align:center; }
    
    /* Reverted to the compact flex layout to fit all items */
    .stats-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
    .stat-item { background:rgba(0,0,0,0.3); padding:5px 8px; border-radius:6px; text-align:center; border:1px solid #222; font-size:0.65rem; }
    .stat-val { font-size:0.8rem; color:var(--accent); font-weight:bold; display:block; }
    
    .script-card{ background:rgba(20,20,30,0.8); border:1px solid var(--accent); padding:12px; border-radius:10px; margin-bottom:12px; }
    .script-body{ background:#000; padding:8px; border-radius:6px; font-size:0.7rem; color:var(--accent); margin:8px 0; word-break:break-all; border-left:3px solid var(--accent); }
    .main-btn { padding:8px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; width:100%; border-radius:5px; font-family:Orbitron; font-size:0.75rem; }
    
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; }
    .modal-content { background:#111; padding:20px; border:1px solid var(--accent); border-radius:10px; width:85%; max-width:300px; }
    input { width:100%; padding:8px; margin:5px 0; background:#000; border:1px solid #444; color:white; border-radius:4px; box-sizing:border-box; }
  </style>
</head>
<body>

<div class="container">
  <div class="dashboard-container">
    <div class="dashboard-title">Usage Dashboard</div>
    <div class="stats-grid" id="dashboard-stats"></div>
  </div>
  <div id="scripts-container"></div>
</div>

<div id="modal" class="modal"><div class="modal-content" id="modalBody"></div></div>

<script>
  const PASSWORD = "syntax2011";
  let data = {
    scripts: [
      {name: 'Adopt Me', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/adopt-me"))()', count: 0},
      {name: 'MM2', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/Overdrive-H/refs/heads/main/loader.lua"))()', count: 0},
      {name: 'Steal A Brainrot', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/sab"))()', count: 0},
      {name: 'Sailor', code: 'loadstring(game:HttpGet("https://api.luarmor.net/files/v3/loaders/blf30331e1af9ab6a96fc80cd08b28a9.lua"))()', count: 0},
      {name: 'Blox Fruit', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua"))()', count: 0}
    ]
  };

  function render() {
    const container = document.getElementById('scripts-container');
    const dash = document.getElementById('dashboard-stats');
    container.innerHTML = ''; dash.innerHTML = '';
    
    data.scripts.forEach((s, i) => {
      dash.innerHTML += `<div class="stat-item">${s.name}<span class="stat-val">${s.count}</span></div>`;
      container.innerHTML += `<div class="script-card"><div style="font-family:Orbitron; font-size:0.8rem;">⚡ ${s.name}</div><div class="script-body">${s.code}</div><button class="main-btn" onclick="copy(${i})">Copy Script</button></div>`;
    });
  }

  function copy(i) {
    navigator.clipboard.writeText(data.scripts[i].code);
    data.scripts[i].count += 1;
    render();
  }

  render();
</script>
</body>
</html>
