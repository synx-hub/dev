<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYNTAX HUB | ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{ --bg:#050a14; --accent:#00e1ff; --text:#e0f7ff; }
    body{ background:var(--bg); color:var(--text); font-family:'Share Tech Mono', monospace; padding:15px; margin:0; }
    .container{ max-width:600px; margin:auto; width:100%; box-sizing:border-box; }
    
    .header-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .script-card{ background:rgba(13,22,38,0.8); border:1px solid var(--accent); padding:15px; border-radius:15px; margin-bottom:15px; position:relative; }
    .script-body{ background:#000; padding:8px; border-radius:8px; font-size:0.75rem; color:var(--accent); border-left:3px solid var(--accent); margin:10px 0; word-break: break-all; }
    .main-btn { padding:10px 15px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; width:100%; font-family:Orbitron; border-radius:5px; }
    .main-btn:hover { background:var(--accent); color:#000; }
    
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; padding:10px; box-sizing:border-box; }
    .modal-content { background:#0a0a0c; padding:20px; border:1px solid var(--accent); border-radius:15px; width:100%; max-width:400px; }
    .input-wrapper { position: relative; width: 100%; }
    input { width:100%; padding:10px; margin:5px 0 10px 0; background:#000; border:1px solid #333; color:white; border-radius:5px; box-sizing:border-box; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-row">
    <h1 style="font-family:Orbitron; color:var(--accent); margin:0;">SYNTAX HUB</h1>
    <button class="main-btn" style="width:auto; padding:5px 10px" onclick="openModal('password')">ADMIN</button>
  </div>

  <div id="scripts-container"></div>
</div>

<div id="unifiedModal" class="modal">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
  const PASSWORD = "syntax2011";
  const scripts = [
    {name: 'Adopt Me', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/adopt-me"))()'},
    {name: 'Murder Mystery 2', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/Overdrive-H/refs/heads/main/loader.lua"))()'},
    {name: 'Blox Fruit', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua"))()'},
    {name: 'Steal A Brainrot', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/sab"))()'},
    {name: 'Sailor Piece', code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx/loader/v1"))()'}
  ];

  function render() {
    const container = document.getElementById('scripts-container');
    container.innerHTML = '';
    scripts.forEach((s, i) => {
      container.innerHTML += `
        <div class="script-card">
          <div style="font-family:Orbitron; font-weight:bold;">⚡ ${s.name}</div>
          <div class="script-body">${s.code}</div>
          <button class="main-btn" id="btn-${i}" onclick="copyScript(${i})">COPY SCRIPT</button>
        </div>`;
    });
  }

  async function copyScript(i) {
    const btn = document.getElementById(`btn-${i}`);
    await navigator.clipboard.writeText(scripts[i].code);
    btn.innerText = "COPIED!";
    setTimeout(() => { btn.innerText = "COPY SCRIPT"; }, 1500);
  }

  function openModal(type) {
    document.getElementById('unifiedModal').style.display = 'flex';
    document.getElementById('modalBody').innerHTML = `<h3>ADMIN</h3><input type="password" id="passCheck" placeholder="Password..."><button class="main-btn" onclick="checkPassword()">ENTER</button><button class="main-btn" style="margin-top:10px" onclick="closeModal()">CLOSE</button>`;
  }

  function checkPassword() {
    if(document.getElementById('passCheck').value === PASSWORD) alert("Admin Mode Active");
    else alert("Invalid Password!");
  }

  function closeModal() { document.getElementById('unifiedModal').style.display = 'none'; }

  render();
</script>
</body>
</html>
