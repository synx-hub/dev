<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYNTAX HUB | ELITE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root{ --bg:#050a14; --accent:#00e1ff; --text:#e0f7ff; --warn:#ffcc00; }
    body{ background:var(--bg); color:var(--text); font-family:'Share Tech Mono', monospace; padding:20px; margin:0; }
    .container{ max-width:800px; margin:auto; }
    .announcement { background:rgba(255,204,0,0.05); border:1px solid var(--warn); padding:10px; border-radius:4px; margin-bottom:20px; text-align:center; font-size:0.9rem; color:var(--warn); }
    .header-row{ display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--accent); padding-bottom:10px; margin-bottom:20px; }
    .script-card{ border:1px solid var(--accent); padding:20px; border-radius:4px; margin-bottom:20px; background:rgba(13,22,38,0.4); }
    .header-group { display: flex; align-items: center; gap: 10px; font-family: Orbitron; font-weight: bold; margin-bottom: 15px; flex-wrap: wrap; }
    .badge { font-size: 0.6rem; padding: 2px 8px; border: 1px solid var(--accent); color: var(--accent); border-radius: 3px; background: rgba(0, 225, 255, 0.1); }
    .copy-count { font-size: 0.8rem; color: #fff; margin-left: auto; font-family: sans-serif; }
    .script-body{ background:rgba(0,0,0,0.7); padding:15px; border-radius:4px; font-size:0.8rem; color:var(--accent); border:1px solid #333; margin-bottom:15px; word-break: break-all; }
    .main-btn { padding:12px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; width:100%; font-family:Orbitron; font-weight:bold; transition: 0.3s; }
    .main-btn:hover { background: rgba(0, 225, 255, 0.1); }
  </style>
</head>
<body>

<div class="container">
  <div class="announcement" id="announcementText">Welcome to Syntax Hub - Elite Scripts</div>
  <div class="header-row">
    <h1 style="font-family:Orbitron; color:var(--accent); margin:0;">SYNTAX HUB</h1>
  </div>
  <div id="scripts-container"></div>
</div>

<script>
  const defaultData = {
    announcement: "Welcome to Syntax Hub - Elite Scripts",
    scripts: [
      {name: 'Adopt Me', status: 'WORKING', type: 'FREE', count: 0, code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/adopt-me"))()'},
      {name: 'Murder Mystery 2', status: 'WORKING', type: 'FREE', count: 0, code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/Overdrive-H/refs/heads/main/loader.lua"))()'},
      {name: 'Steal A Brainrot', status: 'WORKING', type: 'FREE', count: 0, code: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/synx-hub/dev/refs/heads/main/sab"))()'},
      {name: 'Sailor Piece', status: 'WORKING', type: 'FREE', count: 0, code: 'loadstring(game:HttpGet("https://api.luarmor.net/files/v4/loaders/b1f30331e1af9ab6e96fc80cd00b20a9.lua"))()'}
    ]
  };

  let saved = JSON.parse(localStorage.getItem('syntaxData'));
  let data = saved && saved.scripts ? saved : defaultData;

  function render() {
    document.getElementById('announcementText').innerText = data.announcement;
    const container = document.getElementById('scripts-container');
    container.innerHTML = '';
    data.scripts.forEach((s, i) => {
      container.innerHTML += `
        <div class="script-card">
          <div class="header-group">
            <div style="font-size:1.1rem;">${s.name}</div>
            <div class="badge">${s.status}</div>
            <div class="badge">${s.type}</div>
            <div class="copy-count" id="count-${i}">${s.count}</div>
          </div>
          <div class="script-body">SCRIPT // LOADSTRING<br>${s.code}</div>
          <button class="main-btn" id="btn-${i}" onclick="copyScript(${i})">COPY SCRIPT</button>
        </div>`;
    });
  }

  async function copyScript(i) { 
    const btn = document.getElementById(`btn-${i}`);
    
    // 1. Increment and Save
    data.scripts[i].count = (Number(data.scripts[i].count) || 0) + 1;
    localStorage.setItem('syntaxData', JSON.stringify(data));
    
    // 2. Update UI locally without full re-render
    document.getElementById(`count-${i}`).innerText = data.scripts[i].count;
    await navigator.clipboard.writeText(data.scripts[i].code);
    
    // 3. Button Feedback
    btn.innerText = "COPIED!";
    btn.style.borderColor = "#00ff00";
    btn.style.color = "#00ff00";
    
    setTimeout(() => {
        btn.innerText = "COPY SCRIPT";
        btn.style.borderColor = "var(--accent)";
        btn.style.color = "var(--accent)";
    }, 2000);
  }

  render();
</script>
</body>
</html>
